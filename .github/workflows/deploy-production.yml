name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      STABLE_TAG_PREFIX: production-success
      HEALTHCHECK_URL: ${{ secrets.PRODUCTION_HEALTHCHECK_URL }}
      APP_BASE_PATH: ""
    steps:
      - name: Checkout repository metadata
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Rollback uses the latest tag created only after a successful production
      # deploy and health check. This is safer than rolling back to HEAD~1.
      - name: Resolve last successful production version
        id: last_successful
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force --prune

          LAST_SUCCESSFUL_TAG="$(
            git tag --list "${STABLE_TAG_PREFIX}-*" --sort=-creatordate | head -n 1
          )"

          if [ -z "$LAST_SUCCESSFUL_TAG" ]; then
            echo "No previous successful production tag found."
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_SUCCESSFUL_SHA="$(git rev-list -n 1 "$LAST_SUCCESSFUL_TAG")"

          echo "Last successful production tag: $LAST_SUCCESSFUL_TAG"
          echo "Last successful production SHA: $LAST_SUCCESSFUL_SHA"
          echo "tag=$LAST_SUCCESSFUL_TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$LAST_SUCCESSFUL_SHA" >> "$GITHUB_OUTPUT"

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /home/azureuser/techpay-website
            git fetch origin main --tags --force
            git checkout --force "${{ github.sha }}"
            export NEXT_PUBLIC_BASE_PATH=""
            npm install
            npm run build
            pm2 restart techpay --update-env

      # The deployment is considered successful only after a health endpoint returns 2xx.
      # The configured URL is tried first; fallback checks use APP_BASE_PATH on the same origin.
      - name: Health check production deployment
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "PRODUCTION_HEALTHCHECK_URL secret is required for rollback-safe deploys."
            exit 1
          fi

          mapfile -t HEALTHCHECK_CANDIDATES < <(node .github/scripts/healthcheck-candidates.mjs)

          for attempt in {1..12}; do
            for index in "${!HEALTHCHECK_CANDIDATES[@]}"; do
              candidate_number=$((index + 1))

              echo "Production health check attempt ${attempt}/12, candidate ${candidate_number}/${#HEALTHCHECK_CANDIDATES[@]}"

              if curl --fail --silent --show-error --max-time 10 "${HEALTHCHECK_CANDIDATES[$index]}" > /dev/null; then
                echo "Production health check passed."
                exit 0
              fi
            done

            sleep 10
          done

          echo "Production health check failed after all retries."
          exit 1

      # Mark this exact commit as production-stable only after deploy + health check pass.
      - name: Mark current deployment as successful production version
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          STABLE_TAG="${STABLE_TAG_PREFIX}-$(date -u +'%Y%m%d%H%M%S')-${GITHUB_SHA::7}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$STABLE_TAG" "$GITHUB_SHA" -m "Successful production deployment: $GITHUB_SHA"
          git push origin "$STABLE_TAG"

          echo "Created stable production tag: $STABLE_TAG"

      # If deployment or health check fails, redeploy the last known-good tag.
      - name: Roll back production to last successful version
        if: failure() && steps.last_successful.outputs.tag != ''
        uses: appleboy/ssh-action@master
        env:
          ROLLBACK_TAG: ${{ steps.last_successful.outputs.tag }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ROLLBACK_TAG
          script: |
            set -euo pipefail
            cd /home/azureuser/techpay-website
            git fetch origin main --tags --force
            git checkout --force "$ROLLBACK_TAG"
            export NEXT_PUBLIC_BASE_PATH=""
            npm install
            npm run build
            pm2 restart techpay --update-env

      # Verify rollback health as well. The workflow remains failed so the bad deploy is visible.
      - name: Health check production rollback
        if: failure() && steps.last_successful.outputs.tag != ''
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t HEALTHCHECK_CANDIDATES < <(node .github/scripts/healthcheck-candidates.mjs)

          for attempt in {1..12}; do
            for index in "${!HEALTHCHECK_CANDIDATES[@]}"; do
              candidate_number=$((index + 1))

              echo "Production rollback health check attempt ${attempt}/12, candidate ${candidate_number}/${#HEALTHCHECK_CANDIDATES[@]}"

              if curl --fail --silent --show-error --max-time 10 "${HEALTHCHECK_CANDIDATES[$index]}" > /dev/null; then
                echo "Production rollback health check passed."
                exit 0
              fi
            done

            sleep 10
          done

          echo "Production rollback health check failed. Manual intervention required."
          exit 1
